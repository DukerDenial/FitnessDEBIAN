<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Fitness Pro</title>

<link rel="stylesheet" href="style.css">
<script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>

<body>

<!-- MAIN -->
<div id="main" class="screen active">

    <div class="title">💪 Fitness</div>

    <div class="card">
        <button onclick="openCalendar()">📅 Календарь</button>
        <button onclick="openObservations()">👁 Наблюдения</button>
    </div>

</div>

<!-- OBS -->
<div id="obsScreen" class="screen">

    <div class="title">👁 Наблюдения</div>

    <div class="card">
        <button onclick="openWater()">💧 Вода</button>
        <button onclick="openWeight()">⚖ Вес</button>
    </div>

    <button class="secondary" onclick="backMain()">⬅ Назад</button>

</div>

<!-- WATER -->
<div id="waterScreen" class="screen">

    <div class="title">💧 Вода</div>

    <div class="bottle">
        <div id="waterFill" class="water"></div>
    </div>

    <div id="waterVal">0 мл</div>

    <div class="row">
        <button onclick="addWater()">+250</button>
        <button class="secondary" onclick="removeWater()">-250</button>
    </div>

    <button class="secondary" onclick="backObs()">⬅ Назад</button>

</div>

<!-- WEIGHT -->
<div id="weightScreen" class="screen">

    <div class="title">⚖ Вес</div>

    <input id="weightInput" placeholder="Введите вес" />

    <button onclick="saveWeight()">Сохранить</button>

    <div id="weightHistory"></div>

    <button class="secondary" onclick="backObs()">⬅ Назад</button>

</div>

<!-- CALENDAR -->
<div id="calendarScreen" class="screen">

    <div class="nav">
        <button class="nav-btn" onclick="prevMonth()">‹</button>
        <div id="monthTitle" class="month-title"></div>
        <button class="nav-btn" onclick="nextMonth()">›</button>
    </div>

    <div id="calendar" class="calendar"></div>

    <button class="secondary" onclick="backMain()">⬅ Назад</button>

</div>

<!-- DAY -->
<div id="dayScreen" class="screen">

    <div id="dayTitle" class="title"></div>

    <textarea id="workoutInput" placeholder="Тренировка"></textarea>

    <button onclick="saveWorkout()">Сохранить</button>

    <button class="secondary" onclick="backCalendar()">⬅ Назад</button>

</div>

<script src="app.js"></script>

</body>
</html>
