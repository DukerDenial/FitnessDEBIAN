<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
body {
    margin: 0;
    background: #0f172a;
    color: white;
    font-family: -apple-system;
    overflow: hidden;
}

/* SCREENS */
.screen {
    position: absolute;
    width: 100%;
    height: 100%;
    padding: 20px;
    transition: 0.4s;
}

.hidden {
    transform: translateX(100%);
}

/* TITLE */
.title {
    font-size: 22px;
    font-weight: bold;
    margin-bottom: 15px;
}

/* CARD */
.card {
    background: #1e293b;
    border-radius: 16px;
    padding: 15px;
    margin-bottom: 15px;
}

/* WATER */
.circle {
    width: 140px;
    height: 140px;
    border-radius: 50%;
    background: conic-gradient(#22c55e 0deg, #334155 0deg);
    margin: auto;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: 0.6s;
}

.inner {
    width: 100px;
    height: 100px;
    background: #0f172a;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
}

/* BUTTON */
button {
    width: 100%;
    padding: 12px;
    border-radius: 12px;
    border: none;
    background: #22c55e;
    color: white;
    margin-top: 10px;
}

/* CALENDAR */
.calendar {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 6px;
}

.day {
    background: #334155;
    padding: 10px;
    border-radius: 8px;
    text-align: center;
}

.day.active {
    background: #22c55e;
}
</style>
</head>

<body>

<!-- MAIN -->
<div id="main" class="screen">
    <div class="title">💪 Fitness</div>

    <div class="card">
        <div class="circle" id="waterCircle">
            <div class="inner">
                <span id="waterVal">0</span>
            </div>
        </div>

        <button onclick="addWater()">+250 мл</button>
        <button onclick="removeWater()">-250 мл</button>
    </div>

    <div class="card">
        <button onclick="openCalendar()">📅 Открыть календарь</button>
    </div>
</div>

<!-- CALENDAR -->
<div id="calendarScreen" class="screen hidden">
    <div class="title">📅 Календарь</div>

    <div class="calendar" id="calendar"></div>

    <button onclick="backMain()">⬅ Назад</button>
</div>

<!-- DAY -->
<div id="dayScreen" class="screen hidden">
    <div class="title" id="dayTitle"></div>

    <div class="card">
        <textarea id="workout" placeholder="Тренировка" style="width:100%; border-radius:10px;"></textarea>
        <button onclick="saveWorkout()">💪 Сохранить</button>
    </div>

    <button onclick="backCalendar()">⬅ Назад</button>
</div>

<script>

const tg = window.Telegram.WebApp;
tg.expand();

// ---------- STATE ----------
let water = 0;
let selectedDay = null;

// ---------- NAV ----------
function openCalendar() {
    switchScreen("calendarScreen");
}

function backMain() {
    switchScreen("main");
}

function backCalendar() {
    switchScreen("calendarScreen");
}

function switchScreen(id) {
    document.querySelectorAll(".screen").forEach(s => s.classList.add("hidden"));
    document.getElementById(id).classList.remove("hidden");
}

// ---------- WATER ----------
function updateWater() {
    let percent = water / 2000;
    let deg = percent * 360;

    document.getElementById("waterCircle").style.background =
        `conic-gradient(#22c55e ${deg}deg, #334155 ${deg}deg)`;

    document.getElementById("waterVal").innerText = water + " мл";
}

function addWater() {
    water += 250;
    updateWater();
}

function removeWater() {
    water = Math.max(0, water - 250);
    updateWater();
}

// ---------- CALENDAR ----------
function drawCalendar() {
    let cal = document.getElementById("calendar");
    cal.innerHTML = "";

    let today = new Date();

    for (let i = 1; i <= 30; i++) {
        let el = document.createElement("div");
        el.className = "day";
        el.innerText = i;

        if (i === today.getDate()) el.classList.add("active");

        el.onclick = () => openDay(i);

        cal.appendChild(el);
    }
}

// ---------- DAY ----------
function openDay(day) {
    selectedDay = day;
    document.getElementById("dayTitle").innerText = "📅 День " + day;
    switchScreen("dayScreen");
}

function saveWorkout() {
    let val = document.getElementById("workout").value;
    alert("🔥 Сохранено: " + val);
}

// ---------- INIT ----------
drawCalendar();
updateWater();

</script>

</body>
</html>
