<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Fitness Pro</title>

<link rel="stylesheet" href="style.css">
<script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>

<body>

<!-- MAIN -->
<div id="main" class="screen">

    <div class="header">
        <div class="title">💪 Fitness</div>
    </div>

    <div class="card">

        <!-- 💧 БУТЫЛКА -->
        <div class="bottle-container" onclick="addWater()">
            <div class="bottle">
                <div id="waterFill" class="water"></div>
            </div>
            <div class="water-text" id="waterVal">0 мл</div>
        </div>

        <div class="row">
            <button class="secondary" onclick="removeWater()">−250</button>
        </div>

    </div>

    <div class="card">
        <button class="primary" onclick="openCalendar()">📅 Календарь</button>
    </div>

</div>

<!-- CALENDAR -->
<div id="calendarScreen" class="screen hidden">

    <div class="header">
        <button class="nav-btn" onclick="prevMonth()">‹</button>
        <div id="monthTitle" class="title"></div>
        <button class="nav-btn" onclick="nextMonth()">›</button>
    </div>

    <div id="calendar" class="calendar"></div>

    <button class="secondary" onclick="backMain()">Назад</button>

</div>

<!-- DAY -->
<div id="dayScreen" class="screen hidden">

    <div id="dayTitle" class="title"></div>

    <textarea id="workout" placeholder="Тренировка"></textarea>

    <button class="primary" onclick="saveWorkout()">Сохранить</button>

    <button class="secondary" onclick="backCalendar()">Назад</button>

</div>

<script src="app.js"></script>

</body>
</html>
