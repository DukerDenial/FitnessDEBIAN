<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Fitness Pro</title>

<link rel="stylesheet" href="style.css">
<script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>

<body>

<div id="main" class="screen">
    <div class="title">💪 Fitness</div>

    <div class="card center">
        <div class="circle" id="waterCircle">
            <div class="inner" id="waterVal">0</div>
        </div>

        <div class="row">
            <button onclick="addWater()">+250</button>
            <button onclick="removeWater()">-250</button>
        </div>
    </div>

    <div class="card">
        <button onclick="openCalendar()">📅 Календарь</button>
    </div>
</div>

<!-- CALENDAR -->
<div id="calendarScreen" class="screen hidden">

    <div class="header">
        <button onclick="prevMonth()">⬅</button>
        <div id="monthTitle"></div>
        <button onclick="nextMonth()">➡</button>
    </div>

    <div id="calendar" class="calendar"></div>

    <button class="back" onclick="backMain()">⬅ Назад</button>
</div>

<!-- DAY -->
<div id="dayScreen" class="screen hidden">

    <div id="dayTitle" class="title"></div>

    <textarea id="workout" placeholder="Тренировка"></textarea>
    <button onclick="saveWorkout()">Сохранить</button>

    <button class="back" onclick="backCalendar()">⬅ Назад</button>
</div>

<script src="app.js"></script>

</body>
</html>
