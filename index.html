<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Fitness Pro</title>

<link rel="stylesheet" href="style.css">
<script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>

<body>

<!-- MAIN -->
<div id="main" class="screen active">

    <div class="title">💪 Fitness</div>

    <div class="card">
        <button onclick="openCalendar()">📅 Календарь</button>
        <button onclick="openObservations()">👁 Наблюдения</button>
    </div>

</div>

<!-- OBSERVATIONS -->
<div id="obsScreen" class="screen">

    <div class="title">👁 Наблюдения</div>

    <div class="card">
        <button onclick="openWater()">💧 Вода</button>
        <button>⚖ Вес</button>
    </div>

    <button class="secondary" onclick="backMain()">⬅ Назад</button>

</div>

<!-- WATER -->
<div id="waterScreen" class="screen">

    <div class="title">💧 Вода</div>

    <div class="bottle">
        <div id="waterFill" class="water"></div>
        <div id="bubbles"></div>
    </div>

    <div id="waterVal">0 мл</div>

    <div class="row">
        <button onclick="addWater()">+250</button>
        <button class="secondary" onclick="removeWater()">-250</button>
    </div>

    <button class="secondary" onclick="backObs()">⬅ Назад</button>

</div>

<!-- CALENDAR -->
<div id="calendarScreen" class="screen">

    <div class="header">
        <button class="nav-btn" onclick="prevMonth()">⬅</button>
        <div id="monthTitle"></div>
        <button class="nav-btn" onclick="nextMonth()">➡</button>
    </div>

    <div id="calendar" class="calendar"></div>

    <button class="secondary" onclick="backMain()">⬅ Назад</button>

</div>

<script src="app.js"></script>

</body>
</html>
